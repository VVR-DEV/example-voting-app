apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vote
  name: vote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
      - image: examplevotingapp_vote:nodebug
        imagePullPolicy: Never
        name: vote
        ports:
        - containerPort: 80
          name: vote
        resources:
          limits:
            cpu: "0.25"
            memory: "128Mi"
          requests:
            cpu: "0.1"
            memory: "50Mi"
